services:
  - type: web
    name: mychat
    runtime: node
    buildCommand: npm ci --legacy-peer-deps && npm run build
    startCommand: npm start
    healthCheckPath: /api/ready
    maxShutdownDelaySeconds: 300
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: PORT
        value: 3000
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEP_TIER_BASE_URL
        sync: false
      - key: DEEP_TIER_API_KEY
        sync: false
      - key: DEEP_TIER_MODEL
        sync: false
      - key: DEEP_TIER_AUTH_TYPE
        sync: false
      - key: DEEP_TIER_IMAGE_BASE_URL
        sync: false
      - key: DEEP_TIER_IMAGE_API_KEY
        sync: false
      - key: DEEP_TIER_IMAGE_AUTH_TYPE
        sync: false
      - key: DEEP_TIER_IMAGE_MODEL
        sync: false
      - key: DEEP_TIER_VIDEO_BASE_URL
        sync: false
      - key: DEEP_TIER_VIDEO_API_KEY
        sync: false
      - key: DEEP_TIER_VIDEO_AUTH_TYPE
        sync: false
      - key: DEEP_TIER_VIDEO_MODEL
        sync: false
      - key: MIMO_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: E2B_API_KEY
        sync: false
      - key: E2B_TEMPLATE
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: AGENT_CREDENTIAL_KEY
        sync: false
      - key: AGENT_PUBLIC_URL
        value: https://mychat-nm6x.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://usibkqqksgwgvdiqwpyo.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: sb_publishable_yYWthfTKT4K0vYT-dKPFLQ_gavblOSj
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GENERATION_MAINTENANCE_MODE
        sync: false
