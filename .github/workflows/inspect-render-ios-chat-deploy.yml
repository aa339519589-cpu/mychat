name: Inspect Render iOS chat deploy

on:
  pull_request:
    paths:
      - .github/workflows/inspect-render-ios-chat-deploy.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      LIVE_URL: https://mychat-nm6x.onrender.com
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts --legacy-peer-deps
      - run: npx playwright install --with-deps webkit
      - name: Capture deployment and readiness
        run: |
          set -euo pipefail
          {
            echo '=== deploys ==='
            curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
              | jq '[.[] | {id:.deploy.id,status:.deploy.status,commit:.deploy.commit.id,createdAt:.deploy.createdAt,updatedAt:.deploy.updatedAt,finishedAt:.deploy.finishedAt}]'
            echo '=== ready ==='
            curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --header 'Accept: application/json' "$LIVE_URL/api/ready"
            echo
          } | tee "$RUNNER_TEMP/render-ios-chat-state.txt"
      - name: Create isolated test account
        run: |
          set -euo pipefail
          render_value() {
            local key="$1"
            local body code value
            body="$(mktemp)"
            code="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "$body" --write-out '%{http_code}' \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key")"
            if [[ "$code" -lt 200 || "$code" -ge 300 ]]; then
              rm -f "$body"
              return 1
            fi
            value="$(jq -er '.value // .envVar.value // .envVarValue.value' "$body")"
            rm -f "$body"
            printf '%s' "$value"
          }
          supabase_url="$(render_value SUPABASE_URL || render_value NEXT_PUBLIC_SUPABASE_URL)"
          service_key="$(render_value SUPABASE_SERVICE_ROLE_KEY)"
          email="mychat-live-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.com"
          password="Aa9-$(openssl rand -hex 12)"
          echo "::add-mask::$supabase_url"
          echo "::add-mask::$service_key"
          echo "::add-mask::$email"
          echo "::add-mask::$password"
          response_file="$(mktemp)"
          code="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
            --output "$response_file" --write-out '%{http_code}' \
            --request POST \
            --header "apikey: $service_key" \
            --header "Authorization: Bearer $service_key" \
            --header 'Content-Type: application/json' \
            --data "$(jq -nc --arg email "$email" --arg password "$password" '{email:$email,password:$password,email_confirm:true}')" \
            "$supabase_url/auth/v1/admin/users")"
          if [[ "$code" -lt 200 || "$code" -ge 300 ]]; then
            echo "Supabase admin create failed: status=$code" >&2
            jq '{code,message,msg,error_description}' "$response_file" >&2 || true
            exit 1
          fi
          user_id="$(jq -er '.id' "$response_file")"
          rm -f "$response_file"
          echo "::add-mask::$user_id"
          {
            echo "TEST_EMAIL=$email"
            echo "TEST_PASSWORD=$password"
            echo "TEST_USER_ID=$user_id"
            echo "SUPABASE_ADMIN_URL=$supabase_url"
            echo "SUPABASE_SERVICE_KEY=$service_key"
          } >> "$GITHUB_ENV"
      - name: Send a real chat turn from iPhone WebKit
        run: |
          cat > "$GITHUB_WORKSPACE/.live-ios-chat.mjs" <<'EOF'
          import { webkit } from '@playwright/test'

          const browser = await webkit.launch({ headless: true })
          const context = await browser.newContext({
            viewport: { width: 390, height: 844 },
            userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.5 Mobile/15E148 Safari/604.1',
          })
          const page = await context.newPage()
          const started = new Map()
          let chatRequest = null
          page.on('request', request => {
            if (!request.url().includes('/api/')) return
            started.set(request, Date.now())
            if (request.url().endsWith('/api/chat')) {
              try { chatRequest = request.postDataJSON() } catch { chatRequest = request.postData() }
            }
            console.log(`REQUEST ${request.method()} ${request.url()}`)
          })
          page.on('response', async response => {
            if (!response.url().includes('/api/')) return
            const elapsed = Date.now() - (started.get(response.request()) ?? Date.now())
            let body = ''
            try { body = await response.text() } catch {}
            console.log(`RESPONSE ${response.status()} ${elapsed}ms ${response.url()} ${body.slice(0, 1000)}`)
          })
          page.on('requestfailed', request => {
            if (request.url().includes('/api/')) console.log(`FAILED ${request.method()} ${request.url()} ${request.failure()?.errorText}`)
          })
          try {
            await page.goto(process.env.LIVE_URL, { waitUntil: 'domcontentloaded', timeout: 120_000 })
            await page.getByLabel('邮箱地址').fill(process.env.TEST_EMAIL)
            await page.getByLabel('密码').fill(process.env.TEST_PASSWORD)
            const auth = page.waitForResponse(response => response.url().endsWith('/api/auth/email'), { timeout: 60_000 })
            await page.getByRole('button', { name: '登录', exact: true }).click()
            const authResponse = await auth
            console.log(`LOGIN ${authResponse.status()} ${(await authResponse.text()).slice(0, 800)}`)
            const input = page.getByPlaceholder('说点什么……')
            await input.waitFor({ state: 'visible', timeout: 60_000 })
            await input.fill('你好')
            const sentAt = Date.now()
            await input.press('Enter')
            const outcome = await Promise.race([
              page.waitForFunction(() => {
                const body = document.body.innerText
                if (body.includes('连接超时，请重试')) return 'client_timeout'
                if (body.includes('发送失败，请重试')) return 'send_failed'
                if (body.includes('模型生成失败')) return 'model_failed'
                if (document.querySelector('button[title="复制"]')) return 'assistant_reply'
                return null
              }, { timeout: 90_000 }).then(handle => handle.jsonValue()),
              page.waitForTimeout(90_000).then(() => 'deadline'),
            ])
            console.log(`OUTCOME ${outcome} elapsed=${Date.now() - sentAt}ms`)
            console.log(`CHAT_REQUEST ${JSON.stringify(chatRequest)}`)
            console.log(`BODY ${JSON.stringify((await page.locator('body').innerText()).slice(0, 2500))}`)
            if (outcome !== 'assistant_reply') process.exitCode = 1
          } finally {
            await browser.close()
          }
          EOF
          set -o pipefail
          node "$GITHUB_WORKSPACE/.live-ios-chat.mjs" 2>&1 | tee "$RUNNER_TEMP/live-ios-chat.txt"
      - name: Delete isolated test account
        if: always() && env.TEST_USER_ID != ''
        run: |
          curl --fail-with-body --silent --show-error \
            --request DELETE \
            --header "apikey: $SUPABASE_SERVICE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_ADMIN_URL/auth/v1/admin/users/$TEST_USER_ID" >/dev/null
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: render-ios-chat-state
          path: |
            ${{ runner.temp }}/render-ios-chat-state.txt
            ${{ runner.temp }}/live-ios-chat.txt
          if-no-files-found: warn
          retention-days: 1
