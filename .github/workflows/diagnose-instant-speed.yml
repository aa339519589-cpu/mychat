name: Diagnose Instant Speed

on:
  pull_request:
    paths:
      - 'job-worker.ts'
      - 'lib/chat/**'
      - 'lib/jobs/handlers/**'
      - 'tests/**'
      - '.github/workflows/diagnose-instant-speed.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Capture current complexity baseline
        run: npm run complexity:baseline > current-complexity.json
      - name: Upload complexity diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: instant-speed-complexity
          path: current-complexity.json
          if-no-files-found: error
          retention-days: 1
