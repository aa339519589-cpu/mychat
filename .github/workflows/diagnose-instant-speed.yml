name: Diagnose Instant Speed

on:
  pull_request:
    paths:
      - 'job-worker.ts'
      - 'lib/chat/**'
      - 'lib/jobs/handlers/**'
      - 'tests/**'
      - '.github/workflows/diagnose-instant-speed.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Architecture
        continue-on-error: true
        run: npm run architecture
      - name: Complexity
        continue-on-error: true
        run: npm run complexity
      - name: Migration contract
        continue-on-error: true
        run: npm run migration:contract
      - name: Typecheck
        continue-on-error: true
        run: npm run check
      - name: Backend lint
        continue-on-error: true
        run: npm run lint:backend
      - name: Full lint
        continue-on-error: true
        run: npm run lint
      - name: Tests with coverage
        continue-on-error: true
        run: npm run test:coverage
