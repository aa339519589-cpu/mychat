name: Diagnose Complexity Quiet

on:
  pull_request:

permissions:
  contents: read

jobs:
  complexity-quiet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run complexity with compact logs
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${GITHUB_SHA}"
          git checkout -q FETCH_HEAD
          npm ci --ignore-scripts --legacy-peer-deps --silent
          npm run complexity
