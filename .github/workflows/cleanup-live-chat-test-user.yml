name: Cleanup live chat test user

on:
  pull_request:
    paths:
      - .github/workflows/cleanup-live-chat-test-user.yml

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      TARGET_EMAIL: mychat-live-29695281440-1@example.com
    steps:
      - name: Delete isolated test user
        run: |
          set -euo pipefail
          exec > >(tee "$RUNNER_TEMP/cleanup-test-user.txt") 2>&1
          render_value() {
            local key="$1"
            local body code value
            body="$(mktemp)"
            code="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "$body" --write-out '%{http_code}' \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key")"
            if [[ "$code" -lt 200 || "$code" -ge 300 ]]; then rm -f "$body"; return 1; fi
            value="$(jq -er '.value // .envVar.value // .envVarValue.value' "$body")"
            rm -f "$body"
            printf '%s' "$value"
          }
          supabase_url="$(render_value SUPABASE_URL || render_value NEXT_PUBLIC_SUPABASE_URL)"
          service_key="$(render_value SUPABASE_SERVICE_ROLE_KEY)"
          echo "::add-mask::$supabase_url"
          echo "::add-mask::$service_key"
          echo "::add-mask::$TARGET_EMAIL"
          users_file="$(mktemp)"
          code="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
            --output "$users_file" --write-out '%{http_code}' \
            --header "apikey: $service_key" \
            --header "Authorization: Bearer $service_key" \
            "$supabase_url/auth/v1/admin/users?page=1&per_page=100")"
          echo "List users status=$code"
          if [[ "$code" -lt 200 || "$code" -ge 300 ]]; then
            jq '{code,message,msg,error_description}' "$users_file" || cat "$users_file"
            exit 1
          fi
          jq '{shape:type,keys:(if type=="object" then keys else [] end)}' "$users_file"
          user_id="$(jq -r --arg email "$TARGET_EMAIL" '
            (if type == "array" then . else (.users // []) end)
            | .[] | select(.email == $email) | .id
          ' "$users_file" | head -n 1)"
          rm -f "$users_file"
          if [[ -z "$user_id" ]]; then
            echo 'Test user already absent.'
            exit 0
          fi
          echo "::add-mask::$user_id"
          delete_file="$(mktemp)"
          delete_code="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
            --output "$delete_file" --write-out '%{http_code}' \
            --request DELETE \
            --header "apikey: $service_key" \
            --header "Authorization: Bearer $service_key" \
            "$supabase_url/auth/v1/admin/users/$user_id")"
          echo "Delete user status=$delete_code"
          if [[ "$delete_code" -lt 200 || "$delete_code" -ge 300 ]]; then
            jq '{code,message,msg,error_description}' "$delete_file" || cat "$delete_file"
            exit 1
          fi
          rm -f "$delete_file"
          echo 'Test user deleted.'
      - name: Upload cleanup evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cleanup-test-user
          path: ${{ runner.temp }}/cleanup-test-user.txt
          if-no-files-found: warn
          retention-days: 1
