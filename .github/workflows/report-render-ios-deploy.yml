name: Report Render iOS deploy

on:
  pull_request:
    paths:
      - .github/workflows/report-render-ios-deploy.yml

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Capture Render state
        run: |
          set -euo pipefail
          {
            echo '=== deploys ==='
            curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=8" \
              | jq '[.[] | {id:.deploy.id,status:.deploy.status,commit:.deploy.commit.id,createdAt:.deploy.createdAt,updatedAt:.deploy.updatedAt,finishedAt:.deploy.finishedAt}]'
            echo '=== ready ==='
            curl --silent --show-error --connect-timeout 10 --max-time 30 \
              https://mychat-nm6x.onrender.com/api/ready
            echo
          } | tee "$RUNNER_TEMP/render-ios-status.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: render-ios-status
          path: ${{ runner.temp }}/render-ios-status.txt
          retention-days: 1
