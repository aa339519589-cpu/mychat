name: Diagnose Verify Tail

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-tail:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps >/dev/null
      - name: Install browser runtime
        run: npx playwright install --with-deps chromium >/dev/null
      - name: Capture verification output
        id: verify
        continue-on-error: true
        run: npm run verify > verify.log 2>&1
      - name: Upload verification output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: verify-output
          path: verify.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve verification result
        if: steps.verify.outcome == 'failure'
        run: exit 1
