name: Diagnose production regeneration timeout

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-production-regeneration.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      LIVE_URL: https://mychat-nm6x.onrender.com
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts --legacy-peer-deps
      - run: npx playwright install --with-deps webkit
      - name: Create isolated production test account
        run: |
          set -euo pipefail
          render_value() {
            local key="$1" body code value
            body="$(mktemp)"
            code="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "$body" --write-out '%{http_code}' \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key")"
            if [[ "$code" -lt 200 || "$code" -ge 300 ]]; then rm -f "$body"; return 1; fi
            value="$(jq -er '.value // .envVar.value // .envVarValue.value' "$body")"
            rm -f "$body"
            printf '%s' "$value"
          }
          supabase_url="$(render_value SUPABASE_URL || render_value NEXT_PUBLIC_SUPABASE_URL)"
          service_key="$(render_value SUPABASE_SERVICE_ROLE_KEY)"
          email="mychat-regen-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.com"
          password="Aa9-$(openssl rand -hex 12)"
          echo "::add-mask::$supabase_url"
          echo "::add-mask::$service_key"
          echo "::add-mask::$email"
          echo "::add-mask::$password"
          response_file="$(mktemp)"
          code="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
            --output "$response_file" --write-out '%{http_code}' \
            --request POST \
            --header "apikey: $service_key" \
            --header "Authorization: Bearer $service_key" \
            --header 'Content-Type: application/json' \
            --data "$(jq -nc --arg email "$email" --arg password "$password" '{email:$email,password:$password,email_confirm:true}')" \
            "$supabase_url/auth/v1/admin/users")"
          test "$code" -ge 200 -a "$code" -lt 300
          user_id="$(jq -er '.id' "$response_file")"
          rm -f "$response_file"
          echo "::add-mask::$user_id"
          {
            echo "TEST_EMAIL=$email"
            echo "TEST_PASSWORD=$password"
            echo "TEST_USER_ID=$user_id"
            echo "SUPABASE_ADMIN_URL=$supabase_url"
            echo "SUPABASE_SERVICE_KEY=$service_key"
          } >> "$GITHUB_ENV"
      - name: Exercise a real regeneration request
        run: |
          cat > "$GITHUB_WORKSPACE/.diagnose-regeneration.mjs" <<'EOF'
          import { webkit } from '@playwright/test'

          const browser = await webkit.launch({ headless: true })
          const context = await browser.newContext({
            viewport: { width: 390, height: 844 },
            userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.5 Mobile/15E148 Safari/604.1',
          })
          const page = await context.newPage()
          const started = new Map()
          const chatRequests = []

          page.on('request', request => {
            if (!request.url().includes('/api/')) return
            started.set(request, Date.now())
            if (request.url().endsWith('/api/chat')) {
              try { chatRequests.push(request.postDataJSON()) } catch { chatRequests.push(request.postData()) }
            }
            console.log(`REQUEST ${request.method()} ${request.url()}`)
          })
          page.on('response', async response => {
            if (!response.url().includes('/api/')) return
            const elapsed = Date.now() - (started.get(response.request()) ?? Date.now())
            let body = ''
            try { body = await response.text() } catch {}
            console.log(`RESPONSE ${response.status()} ${elapsed}ms ${response.url()} ${body.slice(0, 1600)}`)
          })
          page.on('requestfailed', request => {
            if (request.url().includes('/api/')) console.log(`FAILED ${request.method()} ${request.url()} ${request.failure()?.errorText}`)
          })
          page.on('console', message => console.log(`BROWSER ${message.type()} ${message.text()}`))

          try {
            await page.goto(process.env.LIVE_URL, { waitUntil: 'domcontentloaded', timeout: 120_000 })
            await page.getByLabel('邮箱地址').fill(process.env.TEST_EMAIL)
            await page.getByLabel('密码').fill(process.env.TEST_PASSWORD)
            const loginResponse = page.waitForResponse(response => response.url().endsWith('/api/auth/email'), { timeout: 60_000 })
            await page.getByRole('button', { name: '登录', exact: true }).click()
            const login = await loginResponse
            console.log(`LOGIN ${login.status()} ${(await login.text()).slice(0, 800)}`)

            const input = page.getByPlaceholder('说点什么……')
            await input.waitFor({ state: 'visible', timeout: 60_000 })
            await input.fill('你好')
            await input.press('Enter')
            await page.waitForFunction(() => !!document.querySelector('button[title="复制"]'), { timeout: 90_000 })
            const first = chatRequests[0]
            console.log(`FIRST_REQUEST ${JSON.stringify(first)}`)
            if (!first || typeof first !== 'object') throw new Error('initial request was not captured')

            const regeneration = await page.evaluate(async firstRequest => {
              const generationId = crypto.randomUUID()
              const assistantMessageId = crypto.randomUUID()
              const body = {
                ...firstRequest,
                generationId,
                assistantMessageId,
                turn: {
                  schemaVersion: 2,
                  operation: 'replace-from-user',
                  expectedTailMessageId: firstRequest.assistantMessageId,
                },
              }
              const startedAt = Date.now()
              const response = await fetch('/api/chat', {
                method: 'POST',
                credentials: 'same-origin',
                cache: 'no-store',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              })
              return {
                status: response.status,
                elapsed: Date.now() - startedAt,
                response: await response.text(),
                request: body,
              }
            }, first)

            console.log(`REGENERATION ${JSON.stringify(regeneration)}`)
            console.log(`BODY ${JSON.stringify((await page.locator('body').innerText()).slice(0, 4000))}`)
            if (regeneration.status !== 202) process.exitCode = 1
          } finally {
            await browser.close()
          }
          EOF
          set -o pipefail
          node "$GITHUB_WORKSPACE/.diagnose-regeneration.mjs" 2>&1 | tee "$RUNNER_TEMP/production-regeneration.txt"
      - name: Best-effort cleanup test account
        if: always() && env.TEST_USER_ID != ''
        continue-on-error: true
        run: |
          curl --silent --show-error --request DELETE \
            --header "apikey: $SUPABASE_SERVICE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_ADMIN_URL/auth/v1/admin/users/$TEST_USER_ID" >/dev/null || true
      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: production-regeneration-diagnostic
          path: ${{ runner.temp }}/production-regeneration.txt
          if-no-files-found: error
          retention-days: 1
