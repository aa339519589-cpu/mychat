name: Diagnose fix check

on:
  pull_request:
    paths:
      - lib/chat/job-command.ts
      - tests/chat-job-command.test.ts
      - .github/workflows/diagnose-fix-check.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Typecheck and report failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          npm run check > /tmp/check.log 2>&1
          status=$?
          tail -120 /tmp/check.log
          if (( status != 0 )); then
            {
              echo '<!-- diagnose-fix-check -->'
              echo '```text'
              tail -80 /tmp/check.log
              echo '```'
            } > /tmp/comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md
          fi
          exit $status
