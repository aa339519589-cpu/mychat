name: Verify Chat Reliability Production

on:
  pull_request:

permissions:
  contents: read

jobs:
  production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for exact production revision
        env:
          EXPECTED_REVISION: 19e9134075e8012a13a4e29905f0189544895e02
          READY_URL: https://mychat-nm6x.onrender.com/api/ready
        run: |
          set -euo pipefail
          for attempt in {1..100}; do
            if curl --fail --silent --show-error --max-time 20 "$READY_URL" -o ready.json; then
              cat ready.json
              if jq --exit-status --arg revision "$EXPECTED_REVISION" '
                .ready == true and
                (.revision == $revision or ($revision | startswith(.revision)) or (.revision | startswith($revision)))
              ' ready.json >/dev/null; then
                exit 0
              fi
            fi
            sleep 10
          done
          echo "Production did not activate expected revision" >&2
          exit 1
      - name: Upload readiness evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: chat-reliability-production-${{ github.run_id }}
          path: ready.json
          if-no-files-found: error
          retention-days: 1
