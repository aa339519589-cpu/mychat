name: Inspect production pipeline

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect release state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_RUN_ID: 29649271455
          READY_URL: https://mychat-nm6x.onrender.com/api/ready
        run: |
          echo 'Failed release final lines:'
          gh run view "$RELEASE_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed 2>&1 | tail -n 20 || true
          echo 'Current production readiness:'
          curl --silent --show-error --max-time 30 "$READY_URL" || true
          echo
