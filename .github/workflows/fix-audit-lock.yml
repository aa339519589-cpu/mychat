name: Fix Audit Lock

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Refresh vulnerable transitive dependencies
        run: npm audit fix --package-lock-only --omit=dev --legacy-peer-deps
      - name: Verify production audit
        run: npm audit --omit=dev --audit-level=high
      - name: Upload refreshed lockfile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: refreshed-package-lock-${{ github.run_id }}
          path: package-lock.json
          if-no-files-found: error
          retention-days: 1
