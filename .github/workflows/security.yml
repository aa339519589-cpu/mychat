name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 8 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

      - name: Diagnose CodeQL merge gate
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          api() {
            curl --fail-with-body --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/$1"
          }
          sleep 5
          echo '=== Head check runs ==='
          api "commits/${HEAD_SHA}/check-runs?filter=all&per_page=100" \
            | jq -r '.check_runs[] | [.name, .status, (.conclusion // ""), (.app.slug // ""), (.output.title // ""), (.output.summary // "")] | @tsv'
          echo '=== Merge check runs ==='
          api "commits/${MERGE_SHA}/check-runs?filter=all&per_page=100" \
            | jq -r '.check_runs[] | [.name, .status, (.conclusion // ""), (.app.slug // ""), (.output.title // ""), (.output.summary // "")] | @tsv'
          echo '=== Open CodeQL alerts attributed to PR ==='
          api "code-scanning/alerts?state=open&tool_name=CodeQL&pr=${PR_NUMBER}&per_page=100" \
            | jq -r '.[] | [(.number|tostring), .rule.id, (.rule.security_severity_level // .rule.severity // ""), .most_recent_instance.location.path, (.most_recent_instance.location.start_line|tostring), (.most_recent_instance.message.text // "")] | @tsv'

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Reject vulnerable dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan repository history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
