name: Restore Render worker

on:
  pull_request:
    paths:
      - .github/workflows/restore-render-worker.yml

permissions:
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      READY_URL: https://mychat-nm6x.onrender.com/api/ready
      TARGET_SHA: f7d3ef2c423c356edf2b3b452153967589910c49
    steps:
      - name: Disable all drain switches
        run: |
          set -euo pipefail
          for key in MYCHAT_MAINTENANCE_MODE GENERATION_MAINTENANCE_MODE; do
            curl --fail-with-body --silent --show-error \
              --request PUT \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header 'Content-Type: application/json' \
              --data '{"value":"off"}' \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key" >/dev/null
          done
      - name: Restart exact production revision
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          code="$(curl --silent --show-error --connect-timeout 10 --max-time 60 \
            --output "$response_file" --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header 'Content-Type: application/json' \
            --data "$(jq -nc --arg commitId "$TARGET_SHA" '{commitId:$commitId}')" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")"
          test "$code" -ge 200 -a "$code" -lt 300
          jq '{id,status,commit}' "$response_file"
          rm -f "$response_file"
      - name: Verify healthy non-draining production
        run: |
          set -euo pipefail
          for attempt in {1..180}; do
            payload="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --header 'Accept: application/json' "$READY_URL" || true)"
            ready="$(jq -r '.ready // false' <<<"$payload" 2>/dev/null || true)"
            revision="$(jq -r '.revision // empty' <<<"$payload" 2>/dev/null || true)"
            draining="$(jq -r '.checks.worker.draining // true' <<<"$payload" 2>/dev/null || true)"
            worker="$(jq -r '.checks.worker.ready // false' <<<"$payload" 2>/dev/null || true)"
            echo "Attempt $attempt: ready=$ready revision=${revision:-missing} worker=$worker draining=$draining"
            if [[ "$ready" == "true" && "$revision" == "${TARGET_SHA:0:12}" \
              && "$worker" == "true" && "$draining" == "false" ]]; then
              jq '{ready,revision,checks}' <<<"$payload"
              exit 0
            fi
            sleep 5
          done
          exit 1
