name: Emergency Production Catch-up

on:
  push:
    branches:
      - ops/emergency-production-catchup
    paths:
      - .github/workflows/emergency-production-catchup.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: emergency-production-catchup
  cancel-in-progress: false

jobs:
  recover:
    name: Restore and catch up Render production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PRODUCTION_READY_URL: https://mychat-nm6x.onrender.com/api/ready
    steps:
      - name: Mark recovery pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=pending \
            -f context='Production Recovery' \
            -f description='Restoring Render and catching up to verified main' >/dev/null

      - name: Checkout recovery tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Use the production Node runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Restore service and catch up to latest verified main
        id: recovery
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [[ -z "$RENDER_API_KEY" ]] || [[ ! "$RENDER_SERVICE_ID" =~ ^srv-[a-z0-9]+$ ]]; then
            echo 'RENDER_API_KEY and RENDER_SERVICE_ID must be configured' >&2
            exit 1
          fi

          render_api() {
            curl --fail-with-body --silent --show-error \
              --retry 4 --retry-all-errors --connect-timeout 10 --max-time 60 \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header 'Content-Type: application/json' \
              "$@"
          }

          current_main() {
            gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha'
          }

          wait_for_verified_run() {
            local workflow="$1"
            local revision="$2"
            local label="$3"
            local state
            for attempt in {1..120}; do
              state="$(gh run list --workflow "$workflow" --commit "$revision" \
                --event push --limit 1 --json status,conclusion \
                --jq 'if length == 0 then "missing:" else .[0].status + ":" + (.[0].conclusion // "") end')"
              case "$state" in
                completed:success) return 0 ;;
                completed:*) echo "$label failed for $revision: $state" >&2; return 1 ;;
              esac
              sleep 10
            done
            echo "$label did not complete for $revision" >&2
            return 1
          }

          create_exact_deploy() {
            local revision="$1"
            local body_file status response deploy_id
            body_file="$(mktemp)"
            for attempt in {1..30}; do
              status="$(curl --silent --show-error --output "$body_file" --write-out '%{http_code}' \
                --connect-timeout 10 --max-time 60 \
                --header "Authorization: Bearer $RENDER_API_KEY" \
                --header 'Content-Type: application/json' \
                --request POST \
                --data "$(jq -nc --arg commitId "$revision" '{commitId: $commitId}')" \
                "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")"
              if [[ "$status" == 200 || "$status" == 201 ]]; then
                response="$(cat "$body_file")"
                deploy_id="$(jq -er '.id' <<<"$response")"
                [[ "$deploy_id" =~ ^dep-[a-z0-9]+$ ]]
                rm -f "$body_file"
                printf '%s' "$deploy_id"
                return 0
              fi
              if [[ "$status" == 409 || "$status" == 429 ]]; then
                sleep 10
                continue
              fi
              cat "$body_file" >&2
              echo "Render deploy creation failed with HTTP $status" >&2
              rm -f "$body_file"
              return 1
            done
            rm -f "$body_file"
            echo 'Render remained busy and did not accept the recovery deploy' >&2
            return 1
          }

          wait_for_deploy() {
            local revision="$1"
            local deploy_id="$2"
            local response status commit
            for attempt in {1..180}; do
              response="$(render_api "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id")"
              status="$(jq -er '.status' <<<"$response")"
              commit="$(jq -r '.commit.id // empty' <<<"$response")"
              if [[ -n "$commit" && "$commit" != "$revision" ]]; then
                echo 'Render resolved a different commit during recovery' >&2
                return 1
              fi
              case "$status" in
                live)
                  [[ "$commit" == "$revision" ]]
                  return 0
                  ;;
                build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                  echo "Render recovery deploy failed with status $status" >&2
                  return 1
                  ;;
              esac
              sleep 10
            done
            echo 'Render recovery deploy did not become live before the deadline' >&2
            return 1
          }

          render_api --request PATCH --data '{"autoDeploy":"no"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" >/dev/null

          # Keep production active throughout catch-up. A previous superseded
          # release can leave the service in drain mode; every recovery deploy
          # reloads this authoritative off value.
          render_api --request PUT --data '{"value":"off"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/MYCHAT_MAINTENANCE_MODE" >/dev/null
          render_api \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/MYCHAT_MAINTENANCE_MODE" \
            | jq --exit-status '.value == "off"' >/dev/null

          for cycle in {1..12}; do
            target="$(current_main)"
            if [[ ! "$target" =~ ^[0-9a-f]{40}$ ]]; then
              echo 'Current main did not resolve to a full commit SHA' >&2
              exit 1
            fi

            echo "Catch-up cycle $cycle targeting $target"
            wait_for_verified_run verify.yml "$target" Verify
            wait_for_verified_run security.yml "$target" Security

            latest="$(current_main)"
            if [[ "$latest" != "$target" ]]; then
              echo "Main advanced to $latest before deployment; coalescing onto it"
              continue
            fi

            # Reassert active mode immediately before creating the exact deploy.
            render_api --request PUT --data '{"value":"off"}' \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/MYCHAT_MAINTENANCE_MODE" >/dev/null
            deploy_id="$(create_exact_deploy "$target")"
            wait_for_deploy "$target" "$deploy_id"

            EXPECTED_REVISION="$target" EXPECTED_WORKER_DRAINING=false \
              HEALTH_CHECK_ATTEMPTS=20 HEALTH_CHECK_RETRY_MS=10000 \
              HEALTH_CHECK_TIMEOUT_MS=20000 \
              node scripts/check-production-health.mjs "$PRODUCTION_READY_URL"

            latest="$(current_main)"
            if [[ "$latest" == "$target" ]]; then
              echo "target_sha=$target" >> "$GITHUB_OUTPUT"
              echo "render_deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Production is active on $target; main advanced to $latest, continuing catch-up"
          done

          echo 'Main did not settle within the production catch-up window' >&2
          exit 1

      - name: Mark recovery successful
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.recovery.outputs.target_sha }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=success \
            -f context='Production Recovery' \
            -f description="Render active on ${TARGET_SHA:0:12}" >/dev/null

      - name: Mark recovery failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=failure \
            -f context='Production Recovery' \
            -f description='Render recovery or verified catch-up failed' >/dev/null
