name: Diagnose user prompt change

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Capture complexity regression
        id: scan
        shell: bash
        run: |
          set +e
          npm run complexity > /tmp/complexity.log 2>&1
          status=$?
          set -e
          for entry in \
            settings:components/sidebar/settings.tsx \
            request_context:lib/chat/request-context.ts \
            profile:lib/data/profile.ts \
            chat_input:lib/jobs/handlers/chat-input.ts \
            chat_instant:lib/jobs/handlers/chat-instant.ts \
            chat_text:lib/jobs/handlers/chat-text.ts \
            prompt_shared:lib/user-system-prompt.ts \
            prompt_loader:lib/chat/user-system-prompt.ts; do
            key="${entry%%:*}"
            path="${entry#*:}"
            if grep -Fq "$path" /tmp/complexity.log; then
              echo "$key=true" >> "$GITHUB_OUTPUT"
            else
              echo "$key=false" >> "$GITHUB_OUTPUT"
            fi
          done
          echo "failed=$([[ $status -ne 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - name: Regression in settings
        if: steps.scan.outputs.settings == 'true'
        continue-on-error: true
        run: exit 1
      - name: Regression in request context
        if: steps.scan.outputs.request_context == 'true'
        continue-on-error: true
        run: exit 1
      - name: Regression in profile
        if: steps.scan.outputs.profile == 'true'
        continue-on-error: true
        run: exit 1
      - name: Regression in chat input
        if: steps.scan.outputs.chat_input == 'true'
        continue-on-error: true
        run: exit 1
      - name: Regression in chat instant
        if: steps.scan.outputs.chat_instant == 'true'
        continue-on-error: true
        run: exit 1
      - name: Regression in chat text
        if: steps.scan.outputs.chat_text == 'true'
        continue-on-error: true
        run: exit 1
      - name: Regression in shared prompt
        if: steps.scan.outputs.prompt_shared == 'true'
        continue-on-error: true
        run: exit 1
      - name: Regression in prompt loader
        if: steps.scan.outputs.prompt_loader == 'true'
        continue-on-error: true
        run: exit 1
      - name: Enforce complexity result
        if: steps.scan.outputs.failed == 'true'
        run: exit 1
