name: Diagnose user prompt change

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Complexity settings
        continue-on-error: true
        run: npx eslint components/sidebar/settings.tsx --rule 'complexity:["error",15]' --rule 'max-lines-per-function:["error",{"max":80,"skipBlankLines":true,"skipComments":true,"IIFEs":true}]'
      - name: Complexity profile
        continue-on-error: true
        run: npx eslint lib/data/profile.ts --rule 'complexity:["error",15]' --rule 'max-lines-per-function:["error",{"max":80,"skipBlankLines":true,"skipComments":true,"IIFEs":true}]'
      - name: Complexity chat input
        continue-on-error: true
        run: npx eslint lib/jobs/handlers/chat-input.ts --rule 'complexity:["error",15]' --rule 'max-lines-per-function:["error",{"max":80,"skipBlankLines":true,"skipComments":true,"IIFEs":true}]'
      - name: Complexity chat instant
        continue-on-error: true
        run: npx eslint lib/jobs/handlers/chat-instant.ts --rule 'complexity:["error",15]' --rule 'max-lines-per-function:["error",{"max":80,"skipBlankLines":true,"skipComments":true,"IIFEs":true}]'
      - name: Complexity chat text
        continue-on-error: true
        run: npx eslint lib/jobs/handlers/chat-text.ts --rule 'complexity:["error",15]' --rule 'max-lines-per-function:["error",{"max":80,"skipBlankLines":true,"skipComments":true,"IIFEs":true}]'
      - name: Complexity request context
        continue-on-error: true
        run: npx eslint lib/chat/request-context.ts --rule 'complexity:["error",15]' --rule 'max-lines-per-function:["error",{"max":80,"skipBlankLines":true,"skipComments":true,"IIFEs":true}]'
      - name: Complexity prompt utilities
        continue-on-error: true
        run: npx eslint lib/user-system-prompt.ts lib/chat/user-system-prompt.ts --rule 'complexity:["error",15]' --rule 'max-lines-per-function:["error",{"max":80,"skipBlankLines":true,"skipComments":true,"IIFEs":true}]'
      - name: Enforce repository complexity
        run: npm run complexity
