name: Verify production revision 118

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for exact healthy Render revision
        env:
          EXPECTED_REVISION: b00fe9af4445
        run: |
          for attempt in $(seq 1 60); do
            body="$(curl --silent --show-error --max-time 20 https://mychat-nm6x.onrender.com/api/ready || true)"
            echo "$body"
            status="$(printf '%s' "$body" | jq -r '.status // empty' 2>/dev/null || true)"
            ready="$(printf '%s' "$body" | jq -r '.ready // false' 2>/dev/null || true)"
            revision="$(printf '%s' "$body" | jq -r '.revision // empty' 2>/dev/null || true)"
            if [[ "$status" == "ok" && "$ready" == "true" && "$revision" == "$EXPECTED_REVISION" ]]; then
              exit 0
            fi
            sleep 10
          done
          echo "Exact production revision did not become ready" >&2
          exit 1
