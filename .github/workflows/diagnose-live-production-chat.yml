name: Diagnose live production chat

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-live-production-chat.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      LIVE_URL: https://mychat-nm6x.onrender.com
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts --legacy-peer-deps
      - run: npx playwright install --with-deps webkit
      - name: Create isolated production test user
        run: |
          set -euo pipefail
          render_value() {
            curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$1" \
              | jq -er '.value'
          }
          supabase_url="$(render_value SUPABASE_URL 2>/dev/null || render_value NEXT_PUBLIC_SUPABASE_URL)"
          service_key="$(render_value SUPABASE_SERVICE_ROLE_KEY)"
          email="mychat-live-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.com"
          password="Aa9!$(openssl rand -hex 12)"
          echo "::add-mask::$supabase_url"
          echo "::add-mask::$service_key"
          echo "::add-mask::$email"
          echo "::add-mask::$password"
          payload="$(jq -nc --arg email "$email" --arg password "$password" '{email:$email,password:$password,email_confirm:true}')"
          created="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "apikey: $service_key" \
            --header "Authorization: Bearer $service_key" \
            --header 'Content-Type: application/json' \
            --data "$payload" \
            "$supabase_url/auth/v1/admin/users")"
          user_id="$(jq -er '.id' <<<"$created")"
          {
            echo "TEST_EMAIL=$email"
            echo "TEST_PASSWORD=$password"
            echo "TEST_USER_ID=$user_id"
            echo "SUPABASE_ADMIN_URL=$supabase_url"
          } >> "$GITHUB_ENV"
      - name: Exercise authenticated iPhone WebKit chat turn
        run: |
          cat > "$GITHUB_WORKSPACE/.live-chat-diagnostic.mjs" <<'EOF'
          import { webkit } from '@playwright/test'

          const baseUrl = process.env.LIVE_URL
          const browser = await webkit.launch({ headless: true })
          const context = await browser.newContext({
            viewport: { width: 390, height: 844 },
            userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.5 Mobile/15E148 Safari/604.1',
          })
          const page = await context.newPage()
          let chatRequest = null
          const started = new Map()

          page.on('request', request => {
            if (!request.url().includes('/api/')) return
            started.set(request, Date.now())
            if (request.url().endsWith('/api/chat')) {
              try { chatRequest = request.postDataJSON() } catch { chatRequest = request.postData() }
            }
            console.log(`REQUEST ${request.method()} ${request.url()}`)
          })
          page.on('response', async response => {
            if (!response.url().includes('/api/')) return
            const elapsed = Date.now() - (started.get(response.request()) ?? Date.now())
            let text = ''
            try { text = await response.text() } catch {}
            console.log(`RESPONSE ${response.status()} ${elapsed}ms ${response.url()} ${text.slice(0, 1600)}`)
          })
          page.on('requestfailed', request => {
            if (request.url().includes('/api/')) console.log(`FAILED ${request.method()} ${request.url()} ${request.failure()?.errorText}`)
          })
          page.on('console', message => console.log(`BROWSER ${message.type()} ${message.text()}`))

          try {
            const ready = await context.request.get(`${baseUrl}/api/ready`, { timeout: 30_000 })
            console.log(`READY ${ready.status()} ${(await ready.text()).slice(0, 2000)}`)
            await page.goto(baseUrl, { waitUntil: 'domcontentloaded', timeout: 120_000 })
            await page.getByLabel('邮箱地址').fill(process.env.TEST_EMAIL)
            await page.getByLabel('密码').fill(process.env.TEST_PASSWORD)
            const loginResponsePromise = page.waitForResponse(response => response.url().endsWith('/api/auth/email'), { timeout: 60_000 })
            await page.getByRole('button', { name: '登录', exact: true }).click()
            const loginResponse = await loginResponsePromise
            console.log(`LOGIN_RESULT ${loginResponse.status()} ${(await loginResponse.text()).slice(0, 1200)}`)

            const input = page.getByPlaceholder('说点什么……')
            await input.waitFor({ state: 'visible', timeout: 60_000 }).catch(async error => {
              console.log(`BODY_AFTER_LOGIN ${JSON.stringify((await page.locator('body').innerText()).slice(0, 4000))}`)
              throw error
            })
            await input.fill('你好')
            const sentAt = Date.now()
            await input.press('Enter')

            const outcome = await Promise.race([
              page.waitForFunction(() => {
                const text = document.body.innerText
                if (text.includes('连接超时，请重试')) return 'client_timeout'
                if (text.includes('发送失败，请重试')) return 'send_failed'
                if (text.includes('模型生成失败')) return 'model_failed'
                if (document.querySelector('button[title="复制"]')) return 'assistant_reply'
                return null
              }, { timeout: 90_000 }).then(handle => handle.jsonValue()),
              page.waitForTimeout(90_000).then(() => 'deadline'),
            ])
            console.log(`OUTCOME ${outcome} elapsed=${Date.now() - sentAt}ms`)
            console.log(`CHAT_REQUEST ${JSON.stringify(chatRequest)}`)
            console.log(`BODY ${JSON.stringify((await page.locator('body').innerText()).slice(0, 4000))}`)

            if (chatRequest && typeof chatRequest.conversationId === 'string') {
              const generation = await page.evaluate(async conversationId => {
                const response = await fetch(`/api/v1/conversations/${encodeURIComponent(conversationId)}/generation`, { headers: { Accept: 'application/json' } })
                return { status: response.status, body: await response.text() }
              }, chatRequest.conversationId)
              console.log(`GENERATION ${JSON.stringify(generation)}`)
            }
            if (outcome !== 'assistant_reply') process.exitCode = 1
          } finally {
            await browser.close()
          }
          EOF
          set -o pipefail
          node "$GITHUB_WORKSPACE/.live-chat-diagnostic.mjs" 2>&1 | tee "$RUNNER_TEMP/live-chat-diagnostic.txt"
      - name: Delete isolated production test user
        if: always() && env.TEST_USER_ID != ''
        run: |
          set -euo pipefail
          service_key="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/SUPABASE_SERVICE_ROLE_KEY" \
            | jq -er '.value')"
          curl --fail-with-body --silent --show-error \
            --request DELETE \
            --header "apikey: $service_key" \
            --header "Authorization: Bearer $service_key" \
            "$SUPABASE_ADMIN_URL/auth/v1/admin/users/$TEST_USER_ID" >/dev/null
      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: live-chat-diagnostic
          path: ${{ runner.temp }}/live-chat-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
