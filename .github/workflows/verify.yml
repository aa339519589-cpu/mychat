name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16@sha256:eb4759788a2182f08257135e61a34f2cfc3c2914079f3465d64ee62350f4d081
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Install browser runtime
        run: npx playwright install --with-deps chromium

      - name: Lint, typecheck, test, build, and smoke test
        run: npm run verify

  container:
    name: Container runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          push: false
          build-args: |
            MYCHAT_BUILD_REVISION=${{ github.sha }}
          tags: mychat:verify-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Inspect and smoke test production image
        env:
          IMAGE_TAG: mychat:verify-${{ github.sha }}
          VERIFIED_SHA: ${{ github.sha }}
        run: bash scripts/smoke-production-container.sh "$IMAGE_TAG" "$VERIFIED_SHA"

  publish:
    name: Publish verified image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
      - container
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Require Security for this revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Push did not supply a full immutable commit SHA" >&2
            exit 1
          fi
          for attempt in {1..150}; do
            state="$(gh run list --workflow security.yml --commit "$GITHUB_SHA" \
              --repo "$GITHUB_REPOSITORY" --event push --limit 1 --json status,conclusion \
              --jq 'if length == 0 then "missing:" else .[0].status + ":" + (.[0].conclusion // "") end')"
            case "$state" in
              completed:success) exit 0 ;;
              completed:*) echo "Security failed for $GITHUB_SHA: $state" >&2; exit 1 ;;
            esac
            sleep 10
          done
          echo "Security did not complete for $GITHUB_SHA" >&2
          exit 1

      - name: Checkout verified push revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Confirm checkout identity
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Use the production Node runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Resolve sealed migration contract
        id: contract
        run: |
          node scripts/check-migration-contract.mjs
          manifest="supabase/migrations.manifest.json"
          digest="$(jq -er '.contractDigest' "$manifest")"
          version="$(jq -er '.contractVersion' "$manifest")"
          count="$(jq -er '.migrationCount' "$manifest")"
          if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]] \
            || [[ ! "$version" =~ ^[1-9][0-9]*$ ]] \
            || [[ ! "$count" =~ ^[1-9][0-9]*$ ]]; then
            echo "Migration contract identity is malformed" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve canonical image name
        id: image
        run: |
          name="$(printf '%s' "ghcr.io/$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          if [[ ! "$name" =~ ^ghcr\.io/[a-z0-9._-]+/[a-z0-9._-]+$ ]]; then
            echo "Invalid GHCR image name" >&2
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Build and publish verified image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          build-args: |
            MYCHAT_BUILD_REVISION=${{ github.sha }}
          tags: ${{ steps.image.outputs.name }}:sha-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            io.mychat.schema-contract.digest=${{ steps.contract.outputs.digest }}
            io.mychat.schema-contract.version=${{ steps.contract.outputs.version }}
            io.mychat.schema-contract.migration-count=${{ steps.contract.outputs.count }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Smoke test the published digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Build did not produce an immutable image digest" >&2
            exit 1
          fi
          published_image="$IMAGE_NAME@$IMAGE_DIGEST"
          docker pull "$published_image" >/dev/null
          bash scripts/smoke-production-container.sh "$published_image" "$VERIFIED_SHA"

      - name: Reject high and critical OS vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          format: table
          scanners: vuln
          vuln-type: os
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'

      # This runs on push, so the official SLSA workflow predicate binds the
      # subject to the same source SHA that Verify checked and built.
      - name: Attest published image
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Create immutable release manifest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          MIGRATION_CONTRACT_DIGEST: ${{ steps.contract.outputs.digest }}
          MIGRATION_CONTRACT_VERSION: ${{ steps.contract.outputs.version }}
          MIGRATION_COUNT: ${{ steps.contract.outputs.count }}
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] \
            || [[ ! "$MIGRATION_CONTRACT_DIGEST" =~ ^[0-9a-f]{64}$ ]] \
            || [[ ! "$MIGRATION_CONTRACT_VERSION" =~ ^[1-9][0-9]*$ ]] \
            || [[ ! "$MIGRATION_COUNT" =~ ^[1-9][0-9]*$ ]] \
            || [[ ! "$VERIFIED_SHA" =~ ^[0-9a-f]{40}$ ]] \
            || [[ ! "$GITHUB_RUN_ID" =~ ^[0-9]+$ ]] \
            || [[ ! "$GITHUB_RUN_ATTEMPT" =~ ^[0-9]+$ ]]; then
            echo "Release identity is malformed" >&2
            exit 1
          fi
          manifest_dir="$RUNNER_TEMP/verified-image-manifest"
          mkdir --parents "$manifest_dir"
          jq --compact-output --null-input --sort-keys \
            --arg image "$IMAGE_NAME" \
            --arg digest "$IMAGE_DIGEST" \
            --arg migrationContractDigest "$MIGRATION_CONTRACT_DIGEST" \
            --argjson migrationContractVersion "$MIGRATION_CONTRACT_VERSION" \
            --argjson migrationCount "$MIGRATION_COUNT" \
            --arg revision "$VERIFIED_SHA" \
            --argjson runId "$GITHUB_RUN_ID" \
            --argjson runAttempt "$GITHUB_RUN_ATTEMPT" \
            '{
              schemaVersion: 2,
              image: $image,
              digest: $digest,
              migrationContractDigest: $migrationContractDigest,
              migrationContractVersion: $migrationContractVersion,
              migrationCount: $migrationCount,
              revision: $revision,
              runId: $runId,
              runAttempt: $runAttempt
            }' > "$manifest_dir/manifest.json"
          (
            cd "$manifest_dir"
            sha256sum manifest.json > manifest.sha256
          )

      - name: Upload immutable release manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verified-image-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/verified-image-manifest
          if-no-files-found: error
          compression-level: 0
          overwrite: false
          include-hidden-files: false
          retention-days: 1
