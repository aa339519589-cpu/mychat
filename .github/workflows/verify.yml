name: Verify

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run verification with captured logs
        id: verify
        shell: bash
        run: |
          set +e
          npm run check > typecheck.log 2>&1
          CHECK_STATUS=$?
          npm test > tests.log 2>&1
          TEST_STATUS=$?
          npm run build > build.log 2>&1
          BUILD_STATUS=$?
          printf 'typecheck=%s\ntests=%s\nbuild=%s\n' "$CHECK_STATUS" "$TEST_STATUS" "$BUILD_STATUS" | tee verification-status.txt
          if [ "$CHECK_STATUS" -ne 0 ] || [ "$TEST_STATUS" -ne 0 ] || [ "$BUILD_STATUS" -ne 0 ]; then
            exit 1
          fi

      - name: Inspect production deployment
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.parse import urljoin
          from urllib.request import Request, urlopen
          import re

          base = "https://mychat-nm6x.onrender.com/"
          needle = "brightness(1.24)"
          report = []
          html = ""
          found = False
          assets = []

          try:
              request = Request(base, headers={"User-Agent": "MyChat deployment verifier"})
              with urlopen(request, timeout=90) as response:
                  html = response.read().decode("utf-8", errors="replace")
                  report.append(f"status={response.status}")
                  report.append(f"final_url={response.geturl()}")
                  report.append(f"html_bytes={len(html.encode('utf-8'))}")

              Path("production.html").write_text(html, encoding="utf-8")
              candidates = set(re.findall(r'''(?:src|href)=["']([^"']+)["']''', html))
              assets = sorted(urljoin(base, value) for value in candidates if "_next/static/" in value and ".js" in value)
              report.append(f"javascript_assets={len(assets)}")

              for index, asset in enumerate(assets):
                  try:
                      with urlopen(Request(asset, headers={"User-Agent": "MyChat deployment verifier"}), timeout=60) as response:
                          body = response.read().decode("utf-8", errors="replace")
                      if needle in body:
                          found = True
                          report.append(f"needle_asset={asset}")
                          break
                  except Exception as error:
                      report.append(f"asset_error_{index}={type(error).__name__}: {error}")
          except Exception as error:
              report.append(f"request_error={type(error).__name__}: {error}")

          report.append(f"brightness_fix_live={'yes' if found else 'no'}")
          Path("production-check.txt").write_text("\n".join(report) + "\n", encoding="utf-8")
          print("\n".join(report))
          PY

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-logs
          path: |
            typecheck.log
            tests.log
            build.log
            verification-status.txt
            production-check.txt
            production.html
          if-no-files-found: warn
