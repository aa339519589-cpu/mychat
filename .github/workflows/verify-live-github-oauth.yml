name: Diagnose Render GitHub OAuth environment

on:
  pull_request:
    paths:
      - .github/workflows/verify-live-github-oauth.yml
      - scripts/diagnose-render-oauth-env.sh

permissions:
  contents: read

jobs:
  diagnose:
    name: Render OAuth environment diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      REPO_GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      REPO_GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      REPO_AGENT_CREDENTIAL_KEY: ${{ secrets.AGENT_CREDENTIAL_KEY }}
    steps:
      - name: Checkout temporary diagnostics
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Report configuration presence without exposing values
        run: bash scripts/diagnose-render-oauth-env.sh
