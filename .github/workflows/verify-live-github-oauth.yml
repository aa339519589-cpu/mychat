name: Diagnose Render GitHub OAuth environment

on:
  pull_request:
    paths:
      - .github/workflows/verify-live-github-oauth.yml

permissions:
  contents: read

jobs:
  diagnose:
    name: Render OAuth environment diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      REPO_GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      REPO_GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      REPO_AGENT_CREDENTIAL_KEY: ${{ secrets.AGENT_CREDENTIAL_KEY }}
    steps:
      - name: Report configuration presence without exposing values
        run: |
          set -euo pipefail
          if [[ -z "$RENDER_API_KEY" ]] || [[ ! "$RENDER_SERVICE_ID" =~ ^srv-[a-z0-9]+$ ]]; then
            echo 'render_release_credentials=missing'; exit 1
          fi
          get_env() {
            local key="$1" response code body
            response="$(curl -sS --connect-timeout 10 --max-time 60 \
              -H "Authorization: Bearer $RENDER_API_KEY" -H 'Content-Type: application/json' \
              -w $'\n%{http_code}' "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$key")"
            code="${response##*$'\n'}"; body="${response%$'\n'*}"
            case "$code" in 200) jq -r '.value // ""' <<<"$body";; 404) printf '';; *) exit 2;; esac
          }
          state() { [[ -n "${1:-}" ]] && printf present || printf missing; }
          client_id="$(get_env GITHUB_CLIENT_ID)"
          client_secret="$(get_env GITHUB_CLIENT_SECRET)"
          agent_key="$(get_env AGENT_CREDENTIAL_KEY)"
          legacy_id="$(get_env GITHUB_OAUTH_CLIENT_ID)"
          legacy_secret="$(get_env GITHUB_OAUTH_CLIENT_SECRET)"
          echo "render_github_client_id=$(state "$client_id")"
          echo "render_github_client_secret=$(state "$client_secret")"
          echo "render_agent_credential_key=$(state "$agent_key")"
          echo "render_legacy_oauth_client_id=$(state "$legacy_id")"
          echo "render_legacy_oauth_client_secret=$(state "$legacy_secret")"
          echo "repository_github_client_id_backup=$(state "$REPO_GITHUB_CLIENT_ID")"
          echo "repository_github_client_secret_backup=$(state "$REPO_GITHUB_CLIENT_SECRET")"
          echo "repository_agent_credential_key_backup=$(state "$REPO_AGENT_CREDENTIAL_KEY")"
          [[ -n "${client_id:-$legacy_id}" && -n "${client_secret:-$legacy_secret}" ]] || exit 42
