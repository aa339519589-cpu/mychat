name: Diagnose PR

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: diagnose-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Architecture
        run: npm run architecture
      - name: Complexity
        if: success() || failure()
        run: npm run complexity
      - name: Typecheck
        if: success() || failure()
        run: npm run check
      - name: Backend lint
        if: success() || failure()
        run: npm run lint:backend
      - name: Full lint
        if: success() || failure()
        run: npm run lint
      - name: Tests
        if: success() || failure()
        run: npm run test
      - name: Collect diagnostic reports
        if: always()
        run: |
          mkdir -p diagnostics
          node scripts/check-architecture.mjs --json > diagnostics/architecture.json || true
          npm run complexity:baseline --silent > diagnostics/function-complexity.json || true
      - name: Upload diagnostic reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr-diagnostics-${{ github.run_id }}
          path: diagnostics
          if-no-files-found: error
          retention-days: 1
