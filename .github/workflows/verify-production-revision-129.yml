name: Verify production revision 129

on:
  pull_request:
    paths:
      - .github/workflows/verify-production-revision-129.yml

permissions:
  contents: read

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wait for exact healthy Render revision
        env:
          EXPECTED_REVISION: b49d8583cf23
          READY_URL: https://mychat-nm6x.onrender.com/api/ready
        run: |
          for attempt in {1..180}; do
            payload="$(curl --silent --show-error --connect-timeout 10 --max-time 60 \
              --header 'Accept: application/json' "$READY_URL" || true)"
            revision="$(jq -r '.revision // empty' <<<"$payload" 2>/dev/null || true)"
            ready="$(jq -r '.ready // false' <<<"$payload" 2>/dev/null || true)"
            if [[ "$ready" == "true" && "$revision" == "$EXPECTED_REVISION" ]]; then
              echo "Production is healthy on exact revision $revision"
              exit 0
            fi
            echo "Attempt $attempt: ready=$ready revision=${revision:-missing}"
            sleep 10
          done
          echo "Production did not activate exact revision $EXPECTED_REVISION" >&2
          exit 1
