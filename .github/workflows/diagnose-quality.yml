name: Diagnose Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: diagnose-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps
      - name: Capture coverage output
        id: coverage
        shell: bash
        run: |
          set +e
          npm run test:coverage > coverage.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Upload coverage log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: coverage.log
          if-no-files-found: error
          compression-level: 0
          overwrite: false
          include-hidden-files: false
          retention-days: 1
      - name: Fail on coverage error
        if: steps.coverage.outputs.status != '0'
        run: exit 1
