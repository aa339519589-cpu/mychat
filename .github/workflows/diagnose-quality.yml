name: Diagnose Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write

concurrency:
  group: diagnose-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture coverage failure
        shell: bash
        run: |
          set +e
          npm run test:coverage > coverage.log 2>&1
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            {
              echo '### Coverage diagnostic'
              echo
              echo '```text'
              tail -n 180 coverage.log
              echo '```'
            } > coverage-comment.md
            jq --raw-input --slurp '{body: .}' coverage-comment.md \
              | gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --input - >/dev/null
            cat coverage.log
            exit "$status"
          fi
