name: Diagnose production job control

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-production-job-control.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Inspect Render logs around failed send
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          service="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header 'Accept: application/json' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID")"
          owner_id="$(jq -er '.ownerId // .owner_id' <<<"$service")"
          logs="$(curl --get --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header 'Accept: application/json' \
            --data-urlencode "ownerId=$owner_id" \
            --data-urlencode "resource=$RENDER_SERVICE_ID" \
            --data-urlencode 'startTime=2026-07-19T10:37:00Z' \
            --data-urlencode 'endTime=2026-07-19T10:41:00Z' \
            --data-urlencode 'direction=forward' \
            --data-urlencode 'type=app' \
            --data-urlencode 'limit=100' \
            https://api.render.com/v1/logs)"
          jq -r '((.logs // .items // [])[]) | [.timestamp, (.message // "")] | @tsv' <<<"$logs"
