name: Diagnose production job control

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-production-job-control.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Inspect recent Render chat request logs
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          service="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header 'Accept: application/json' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID")"
          owner_id="$(jq -er '.ownerId // .owner_id' <<<"$service")"
          end_time="$(date --utc +%Y-%m-%dT%H:%M:%SZ)"
          start_time="$(date --utc --date='60 minutes ago' +%Y-%m-%dT%H:%M:%SZ)"
          logs="$(curl --get --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header 'Accept: application/json' \
            --data-urlencode "ownerId=$owner_id" \
            --data-urlencode "resource=$RENDER_SERVICE_ID" \
            --data-urlencode "startTime=$start_time" \
            --data-urlencode "endTime=$end_time" \
            --data-urlencode 'direction=backward' \
            --data-urlencode 'path=/api/chat' \
            --data-urlencode 'method=POST' \
            --data-urlencode 'limit=100' \
            https://api.render.com/v1/logs)"
          jq -c '[((.logs // .items // [])[]) | {timestamp, type, level, message, method, path, statusCode, requestId}]' <<<"$logs"
