name: Diagnose CodeQL gate

on:
  push:
    branches:
      - fix/github-oauth-production-v2

permissions:
  contents: read
  checks: read
  security-events: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for CodeQL and print gate evidence
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          PR_NUMBER: '46'
        run: |
          set -euo pipefail
          api() {
            curl --fail-with-body --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/$1"
          }

          for attempt in $(seq 1 36); do
            runs="$(api "commits/${HEAD_SHA}/check-runs?filter=all&per_page=100")"
            codeql_status="$(jq -r '[.check_runs[] | select(.name == "CodeQL")] | sort_by(.started_at) | last | .status // "missing"' <<<"${runs}")"
            if [[ "${codeql_status}" == "completed" ]]; then
              break
            fi
            sleep 10
          done

          echo '=== Check runs on head ==='
          api "commits/${HEAD_SHA}/check-runs?filter=all&per_page=100" \
            | jq -r '.check_runs[] | [.name, .status, (.conclusion // ""), (.app.slug // ""), (.output.title // ""), (.output.summary // "")] | @tsv'

          echo '=== Open CodeQL alerts attributed to PR ==='
          api "code-scanning/alerts?state=open&tool_name=CodeQL&pr=${PR_NUMBER}&per_page=100" \
            | jq -r '.[] | [(.number|tostring), .rule.id, (.rule.security_severity_level // .rule.severity // ""), .most_recent_instance.location.path, (.most_recent_instance.location.start_line|tostring), (.most_recent_instance.message.text // "")] | @tsv'
