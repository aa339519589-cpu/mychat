name: Keep Render Runtime Active

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout readiness verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use the production Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Keep the free web and embedded worker process ready
        env:
          EXPECTED_REVISION: ${{ github.sha }}
          HEALTH_CHECK_ATTEMPTS: '5'
          HEALTH_CHECK_RETRY_MS: '10000'
          HEALTH_CHECK_TIMEOUT_MS: '20000'
        run: node scripts/check-production-health.mjs https://mychat-nm6x.onrender.com/api/ready

      - name: Verify protected authoritative metrics
        env:
          METRICS_BEARER_TOKEN: ${{ secrets.METRICS_BEARER_TOKEN }}
        run: |
          test -n "$METRICS_BEARER_TOKEN"
          metrics_file="$(mktemp)"
          trap 'rm -f "$metrics_file"' EXIT
          status="$(curl --silent --show-error --output "$metrics_file" --write-out '%{http_code}' \
            --header "Authorization: Bearer $METRICS_BEARER_TOKEN" \
            https://mychat-nm6x.onrender.com/api/metrics)"
          test "$status" = 200
          grep --quiet '^mychat_authoritative_worker_fleet_ready 1$' "$metrics_file"
          grep --quiet '^mychat_authoritative_billing_healthy 1$' "$metrics_file"
          grep --quiet '^mychat_authoritative_billing_release_ready 1$' "$metrics_file"
