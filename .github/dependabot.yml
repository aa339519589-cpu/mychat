version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      production-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:15'
      timezone: America/Chicago
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:30'
      timezone: America/Chicago
    open-pull-requests-limit: 2
